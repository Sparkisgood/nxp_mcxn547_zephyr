CONFIG_GPIO=y
CONFIG_SPI=y
CONFIG_EEPROM=y
CONFIG_EEPROM_AT25=y

# Ethernet and IPv4
CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_ARP=y
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y

# UDS diagnostics over ISO-TP on the Edison CAN0 interface.
CONFIG_CAN=y
CONFIG_CAN_SHELL=y
CONFIG_ISOTP=y
CONFIG_ISOTP_RX_BUF_COUNT=10
CONFIG_ISOTP_RX_BUF_SIZE=56
CONFIG_ISOTP_RX_SF_FF_BUF_COUNT=2

# Obtain the address, netmask, and gateway from the LAN.
CONFIG_NET_DHCPV4=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y

# UART network shell, including the `net ping` command.
CONFIG_SHELL=y
CONFIG_NET_SHELL=y
CONFIG_REBOOT=y

# FlexSPI Port B1 PSRAM and its UART shell test commands.
CONFIG_MEMC=y

# Stage network firmware uploads in PSRAM, then write MCUboot slot 1.
CONFIG_STREAM_FLASH=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_JESD216_API=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_IMG_MANAGER=y
CONFIG_IMG_ERASE_PROGRESSIVELY=y
CONFIG_CRC=y

CONFIG_LOG=y
CONFIG_NET_LOG=y

# HTTP server with one concurrent client.
CONFIG_HTTP_PARSER=y
CONFIG_HTTP_SERVER=y
CONFIG_HTTP_SERVER_MAX_CLIENTS=1

# Required by DHCP, ICMP ping, and the board's random MAC address. This timer
# generator is suitable for connectivity testing, not cryptographic use.
CONFIG_TEST_RANDOM_GENERATOR=y
